<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bloop Adventures — 200 rainy-day stops for toddlers</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23EE352E'/><text x='50' y='72' font-size='52' text-anchor='middle'>&#x1F353;</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#1A1A1A;--paper:#F5F1E8;--card:#FFFFFF;
  --red:#EE352E;--orange:#FF6319;--yellow:#FCCC0A;--green:#00933C;
  --blue:#0039A6;--purple:#B933AD;--lgreen:#6CBE45;
  --muted:#6F6857;--rule:#1A1A1A;
}
html,body{height:100dvh;overflow:hidden}
body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

/* ── HEADER: station signage ── */
.hdr{background:var(--ink);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:14px;position:relative;z-index:1001;border-bottom:4px solid #fff}
.hdr .logo{width:42px;height:42px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:2px solid #fff}
.hdr h1{font-size:21px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.hdr .sub{font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:#B8B2A4;margin-top:3px}
.search{margin-left:auto;display:flex;align-items:center;gap:8px;background:#fff;border-radius:999px;padding:7px 14px;min-width:0}
.search svg{width:14px;height:14px;color:var(--ink);flex-shrink:0}
.search input{border:0;background:0;outline:0;font:inherit;font-size:13px;font-weight:500;color:var(--ink);width:160px;min-width:0}
.search input::placeholder{color:#999}
.cnt-badge{background:#fff;color:var(--ink);font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;flex-shrink:0;white-space:nowrap}
.cnt-badge small{font-weight:500;font-size:10px;letter-spacing:.5px}

/* ── TOOLBAR ── */
.toolbar{background:var(--paper);border-bottom:2px solid var(--ink);position:relative;z-index:1000}
.frow{display:flex;gap:6px;padding:8px 20px;overflow-x:auto;scrollbar-width:none;align-items:center}
.frow::-webkit-scrollbar{display:none}
.frow.cats{padding-bottom:2px}
.frow .sep{width:2px;height:18px;background:var(--ink);opacity:.25;flex-shrink:0;margin:0 4px}
.pill{padding:6px 13px;border-radius:999px;font-size:12px;font-weight:700;border:1.5px solid var(--ink);background:var(--card);color:var(--ink);cursor:pointer;white-space:nowrap;transition:background .12s,color .12s;flex-shrink:0;font-family:inherit;display:flex;align-items:center;gap:7px}
.pill:hover{background:#EFE9DB}
.pill.on{background:var(--ink);color:#fff}
.pill .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.15)}
.pill[data-v="play"].on{background:var(--orange);border-color:var(--orange);color:#fff}
.pill[data-v="museum"].on{background:var(--blue);border-color:var(--blue);color:#fff}
.pill[data-v="nature"].on{background:var(--green);border-color:var(--green);color:#fff}
.pill[data-v="books"].on{background:var(--purple);border-color:var(--purple);color:#fff}
.pill[data-v="classes"].on{background:var(--yellow);border-color:var(--yellow);color:var(--ink)}
.pill[data-v="shows"].on{background:var(--lgreen);border-color:var(--lgreen);color:#fff}
.pill.on .dot{border-color:rgba(255,255,255,.6)}
.pill.today::after{content:"";display:block;width:5px;height:5px;border-radius:50%;background:var(--red)}
.pill.today.on::after{background:#fff}
.slider-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
.slider-lbl{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;min-width:74px}
.slider{-webkit-appearance:none;width:90px;height:4px;border-radius:2px;background:var(--ink);outline:none;cursor:pointer}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--red);border:2px solid #fff;box-shadow:0 0 0 1.5px var(--ink);cursor:pointer}
.slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--red);border:2px solid #fff;box-shadow:0 0 0 1.5px var(--ink);cursor:pointer}
.sortsel{font:inherit;font-size:12px;font-weight:700;border:1.5px solid var(--ink);border-radius:999px;background:var(--card);color:var(--ink);padding:6px 10px;cursor:pointer;flex-shrink:0;-webkit-appearance:none;appearance:none}

/* ── LAYOUT ── */
.main{display:flex;flex-direction:column;flex:1;min-height:0}
#map{height:38%;min-height:200px;flex-shrink:0;border-bottom:2px solid var(--ink)}
.list-wrap{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.grid{display:grid;gap:12px}
.foot-note{grid-column:1/-1;text-align:center;font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;padding:18px 0 8px}

/* ── CARDS ── */
.vc{background:var(--card);border:1.5px solid var(--ink);border-radius:2px;padding:14px 16px;cursor:pointer;transition:box-shadow .12s,transform .12s;display:flex;flex-direction:column;gap:9px;position:relative}
.vc::before{content:"";position:absolute;left:-1.5px;top:-1.5px;bottom:-1.5px;width:5px;background:var(--gc,var(--ink))}
.vc:hover{box-shadow:3px 3px 0 var(--ink);transform:translate(-1px,-1px)}
.vc.on{box-shadow:4px 4px 0 var(--gc,var(--ink));transform:translate(-2px,-2px);border-width:2px}
.vc .vc-top{display:flex;align-items:center;gap:11px}
.bullet{width:30px;height:30px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.vc .vc-title{flex:1;min-width:0}
.vc .nm{font-size:15px;font-weight:700;letter-spacing:-.2px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vc .cat-line{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vc .vc-price{text-align:right;flex-shrink:0;font-size:16px;font-weight:800;letter-spacing:-.3px}
.vc .vc-price.free{color:var(--green)}
.vc .desc-line{font-size:13px;color:#3D3A30;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vc .meta{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);display:flex;flex-wrap:wrap;gap:4px 10px}
.vc .meta .ok{color:var(--green)}
.vc .meta .no{color:var(--red)}

/* ── POPUPS ── */
.leaflet-popup-content-wrapper{border-radius:2px!important;box-shadow:5px 5px 0 rgba(26,26,26,.85)!important;padding:0!important;overflow:hidden;border:2px solid var(--ink)!important}
.leaflet-popup-tip{display:none}
.leaflet-popup-content{margin:0!important;width:300px!important;max-height:400px;overflow-y:auto;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif}
.pop-h{background:var(--ink);color:#fff;padding:14px 16px;display:flex;gap:11px;align-items:center}
.pop-h .bullet{border:2px solid #fff;width:32px;height:32px}
.pop-h h3{font-size:15px;font-weight:700;line-height:1.25;letter-spacing:-.2px}
.pop-h .cat{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:#B8B2A4;margin-top:3px;font-weight:700}
.pop-b{padding:14px 16px;font-size:13px;line-height:1.55;color:#3D3A30;background:#fff}
.pop-b .desc{margin-bottom:13px;padding-bottom:13px;border-bottom:1.5px solid var(--ink)}
.pop-b h4{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink);margin-bottom:6px}
.pop-b .hrs{margin-bottom:13px}
.pop-b .hr-row{display:flex;gap:8px;padding:1px 0;font-size:12px}
.pop-b .hr-row .d{width:36px;font-weight:700;color:var(--ink);flex-shrink:0}
.pop-b .hr-row.tdy{background:var(--paper);margin:0 -6px;padding:1px 6px}
.pop-b .hr-row .closed{color:var(--red);font-weight:700}
.pop-b .pr-row{display:flex;justify-content:space-between;padding:2px 0;font-size:12px}
.pop-b .pr-row .v{font-weight:700}
.pop-b .note{font-size:11px;color:var(--green);margin-top:6px;font-weight:700}
.pop-f{padding:11px 16px;background:var(--paper);border-top:2px solid var(--ink);display:flex;align-items:center;justify-content:space-between}
.pop-f a{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;text-decoration:none;padding:8px 16px;background:var(--ink);border-radius:999px}
.pop-f a:hover{background:var(--red)}
.pop-f .tbadge{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}

/* ── MAP MARKERS ── */
.cm{width:30px;height:30px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;box-shadow:0 1px 4px rgba(0,0,0,.35);border:2px solid #fff}
.cm.home{background:var(--red);width:40px;height:40px;font-size:19px;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.leaflet-container{background:#EAE6DB;font-family:inherit}

.empty-msg{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;line-height:2}
.empty-msg span{display:block;width:44px;height:44px;border-radius:50%;background:var(--ink);color:#fff;font-size:22px;line-height:44px;margin:0 auto 14px}

/* ── RESPONSIVE ── */
@media(min-width:769px){
  .main{flex-direction:row}
  #map{height:100%!important;width:46%;flex:none;order:2;border-bottom:0;border-left:2px solid var(--ink)}
  .list-wrap{flex:1;order:1;padding:16px 20px}
  .grid{grid-template-columns:1fr 1fr}
  .search input{width:200px}
}
@media(min-width:1500px){
  .grid{grid-template-columns:1fr 1fr 1fr}
  #map{width:42%}
}
@media(max-width:768px){
  .hdr{padding:10px 14px;gap:10px;flex-wrap:wrap}
  .hdr h1{font-size:17px}
  .hdr .logo{width:34px;height:34px;font-size:17px}
  .hdr .sub{font-size:8px;letter-spacing:1.2px}
  .cnt-badge{margin-left:auto}
  .search{order:5;flex-basis:100%;margin-left:0}
  .search input{flex:1;width:auto}
  .frow{padding:7px 14px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>

</div>

</div>

const GC={play:"#FF6319",museum:"#0039A6",nature:"#00933C",books:"#B933AD",classes:"#FCCC0A",shows:"#6CBE45"};
function grp(v){
  const c=v.cat;
  if(/Museum|Landmark|Immersive/.test(c))return"museum";
  if(/Zoo|Aquarium|Nature|Garden|Farm|Animals/.test(c))return"nature";
  if(/Library|Bookstore/.test(c))return"books";
  if(/Gym|Classes|Swim|Yoga|Sports|Workshop|Cooking|Community/.test(c))return"classes";
  if(/Music|Theater|Dance/.test(c))return"shows";
  return"play";
}
function bullet(v,extra){const g=grp(v);const fg=g==="classes"?"#1A1A1A":"#fff";return`<div class="bullet ${extra||''}" style="background:${GC[g]};color:${fg}">${v.id}</div>`;}

function isOpenDay(v,di){if(di==="any")return true;const h=v.days[parseInt(di)];return h!==null&&h!=="v";}
function matchF(v){
  if(filters.g!=="any"&&grp(v)!==filters.g)return false;
  if(filters.day!=="any"&&!isOpenDay(v,filters.day))return false;
  if(filters.t<99&&v.t>filters.t)return false;
  if(filters.io==="indoor"&&v.io==="o")return false;
  if(filters.io==="outdoor"&&v.io==="i")return false;
  if(filters.tp==="play"&&v.tp==="c")return false;
  if(filters.tp==="class"&&v.tp==="p")return false;
  if(filters.pr<100&&v.$>filters.pr)return false;
  if(filters.af==="1"&&!v.af)return false;
  return true;
}

  const pH=v.pr.map(([l,val])=>`<div class="pr-row"><span>${l}</span><span class="v">${val}</span></div>`).join('');
  const ioL=v.io==="i"?"Indoor":v.io==="o"?"Outdoor":"Indoor + Outdoor";
  const tpL=v.tp==="p"?"Open Play":v.tp==="c"?"Classes":"Play + Classes";
  mk.bindPopup(`<div class="pop-h">${bullet(v)}<div><h3>${v.n}</h3><div class="cat">${v.cat} &middot; ${ioL} &middot; ${tpL}</div></div></div><div class="pop-b"><div class="desc">${v.d}</div><div class="hrs"><h4>Hours</h4>${hH}</div><div><h4>Pricing</h4>${pH}${v.pn?`<div class="note">${v.pn}</div>`:''}</div></div><div class="pop-f"><a href="${v.w}" target="_blank" rel="noopener">Website &rarr;</a><span class="tbadge">${v.t} min from home</span></div>`,{maxWidth:310,minWidth:280});
  MK[v.id]=mk;
});

let searchQ='';

function render(){
  const g=document.getElementById('grid');g.innerHTML='';
  const f=D.filter(v=>{
    if(searchQ&&!v.n.toLowerCase().includes(searchQ)&&!v.d.toLowerCase().includes(searchQ)&&!v.cat.toLowerCase().includes(searchQ)&&!v.a.toLowerCase().includes(searchQ))return false;
    return matchF(v);
  });
  document.getElementById('count').textContent=f.length;
  D.forEach(v=>{const m=MK[v.id];const show=f.includes(v);if(show){if(!map.hasLayer(m))m.addTo(map);}else{if(map.hasLayer(m))map.removeLayer(m);}});
  if(!f.length){g.innerHTML='<div class="empty-msg" style="grid-column:1/-1"><span>!</span>No stops match your filters.<br>Try widening the search.</div>';return;}
  if(sortBy==="near")f.sort((a,b)=>a.t-b.t||a.id-b.id);
  else if(sortBy==="price")f.sort((a,b)=>a.$-b.$||a.t-b.t);
  else f.sort((a,b)=>a.n.localeCompare(b.n));
  f.forEach(v=>{
    const s=openSt(v);
    const io=v.io==='b'?'In + Out':v.io==='i'?'Indoor':'Outdoor';
    const tp=v.tp==='b'?'Play & Classes':v.tp==='p'?'Open Play':'Classes';
    const c=document.createElement('div');c.className='vc';c.dataset.id=v.id;c.style.setProperty('--gc',GC[grp(v)]);
    c.innerHTML=`
      <div class="vc-top">
        ${bullet(v)}
        <div class="vc-title"><div class="nm">${v.n}</div><div class="cat-line">${v.cat} &middot; ${v.a}</div></div>
        <div class="vc-price ${v.$===0?'free':''}">${fmtP(v)}</div>
      </div>
      <div class="desc-line">${v.d}</div>
      <div class="meta">
        <span class="${s.o?'ok':'no'}">${s.t}</span>
        <span>${v.t} min</span>
        <span>${io}</span>
        <span>${tp}</span>
        ${v.af?'<span>Adults too</span>':''}
      </div>`;
    c.onclick=()=>{document.querySelectorAll('.vc').forEach(x=>x.classList.remove('on'));c.classList.add('on');map.flyTo([v.lt,v.ln],15,{duration:.5});MK[v.id].openPopup();};
    g.appendChild(c);
  });
  const fn=document.createElement('div');fn.className='foot-note';fn.textContent='Hours and prices drift — check the website before heading out';g.appendChild(fn);
}

// Filter pills
document.querySelectorAll('.pill').forEach(b=>{b.onclick=()=>{const gr=b.dataset.g;
  if(gr==='af'){// toggle
    b.classList.toggle('on');filters.af=b.classList.contains('on')?"1":"any";
  }else{
    document.querySelectorAll(`.pill[data-g="${gr}"]`).forEach(x=>x.classList.remove('on'));b.classList.add('on');
    filters[gr]=gr==='t'?parseInt(b.dataset.v):b.dataset.v;
  }
  render();
};});

// Mark today's day pill
const tdPill=document.querySelector(`.pill[data-g="day"][data-v="${todayIdx}"]`);
if(tdPill)tdPill.classList.add('today');

// Price slider
const ps=document.getElementById('price-slider');
const pl=document.getElementById('price-lbl');
ps.addEventListener('input',()=>{
  filters.pr=parseInt(ps.value);
  pl.textContent=filters.pr>=100?'Any price':filters.pr===0?'Free only':'Up to $'+filters.pr;
  render();
});

// Sort
document.getElementById('sort').addEventListener('change',e=>{sortBy=e.target.value;render();});

// Search
document.getElementById('q').addEventListener('input',e=>{searchQ=e.target.value.toLowerCase().trim();render();});

// Popup <-> card sync
map.on('popupopen',e=>{const ll=e.popup._latlng;const v=D.find(x=>Math.abs(x.lt-ll.lat)<.0002&&Math.abs(x.ln-ll.lng)<.0002);if(v){document.querySelectorAll('.vc').forEach(x=>x.classList.remove('on'));const c=document.querySelector(`.vc[data-id="${v.id}"]`);if(c){c.classList.add('on');c.scrollIntoView({behavior:'smooth',block:'nearest'});}}});

render();
</script>
</body>
</html>
